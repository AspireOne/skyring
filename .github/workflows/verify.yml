name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run static, integration, network, performance, and soak gates
        run: pnpm verify && pnpm test:integration && pnpm test:network && pnpm test:performance && pnpm test:soak

      - name: Run compiled production smoke
        run: pnpm test:smoke

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run production browser smoke tests
        run: pnpm test:e2e && pnpm test:performance:browser

      - name: Retain browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-evidence
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
