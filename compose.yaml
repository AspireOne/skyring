services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      HOST: 0.0.0.0
      PORT: 8080
    ports:
      - '8080:8080'

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        VITE_SERVER_URL: ws://localhost:8080
    depends_on:
      server:
        condition: service_healthy
    ports:
      - '4173:8080'
