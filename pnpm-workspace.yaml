packages:
  - packages/*

# Avoid newly published packages by default; latest tooling is opted in explicitly.
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@playwright/test@1.61.1'
  - '@vitest/coverage-v8@4.1.10'
  - concurrently@10.0.3
  - prettier@3.9.6
  - tsx@4.23.1
  - vitest@4.1.10
  - ws@8.21.1

allowBuilds:
  esbuild: true
